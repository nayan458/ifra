services:
  zookeeper:
    image: zookeeper:3.9.5
    container_name: zookeeper
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/data
      - zookeeper_logs:/datalog

  kafka:
    image: confluentinc/cp-kafka:7.6.11
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    env_file:
      - ./env/kafka.env
    volumes:
      - kafka_data:/var/lib/kafka/data

  akhq:
    image: tchiotludo/akhq:0.25.1
    container_name: akhq
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            local-kafka:
              properties:
                bootstrap.servers: "kafka:9092"

volumes:
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local