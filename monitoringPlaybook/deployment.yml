  hosts: web_servers
  become: true

  vars_files:
    - vault/secrets.yml

  vars:
    project_dir: "/home/ssp/monitoring"
    ansible_user: "{{ web_server_user }}"
    ansible_password: "{{ web_server_password }}"
    ansible_become_password: "{{ web_server_password }}"

  tasks:

