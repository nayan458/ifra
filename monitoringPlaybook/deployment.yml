  #     state: present

  # - name: Ensure Docker service is started
  #   service:
  #     name: docker
  #     state: started
  #     enabled: true

  - name: Add user to docker group
    user:
      name: "{{ web_server_user }}"
      groups: docker
      append: yes

  - name: Create project directory
    file:
      path: "{{ project_dir }}"
      state: directory
      mode: "0755"

  - name: Copy docker compose file
    copy:
      src: "docker/compose.yml"
      dest: "{{ project_dir }}/docker-compose.yml"

  - name: Copy prometheus file
    copy:
      src: "prometheus.yml"
      dest: "{{ project_dir }}/prometheus.yml"

  - name: Copy alert file
    copy:
      src: "alert.yml"
      dest: "{{ project_dir }}/alert.yml"

  - name: Copy alert manager file
    copy:
      src: "alertManager.yml"
      dest: "{{ project_dir }}/alertManager.yml"

  - name: Add hostnames to /etc/hosts
    lineinfile:
      path: /etc/hosts
      line: "{{ item }}"
      state: present
    loop:
      - "10.180.93.12  suggestion_model"
      - "10.180.93.12  classification_model"
      - "10.180.93.12  content_moderation"
      - "10.180.93.12  rocm_exporter"
      - "10.182.0.210 geo"
      - "10.180.22.114 mongodb-primary"
      - "10.180.22.115 mongodb-secondary"
      - "10.180.22.116 mongodb-arbiter"
      - "10.180.148.197 stoneinscription-backend"

  - name: Tear down existing stack completely
    community.docker.docker_compose_v2:
      project_src: "{{ project_dir }}"
      state: absent
      remove_orphans: true
      remove_volumes: true

  - name: Start Monitoring stack with docker compose
    community.docker.docker_compose_v2:
      project_src: "{{ project_dir }}"
      state: present
      remove_orphans: true