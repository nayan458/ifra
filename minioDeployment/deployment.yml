# ── Phase 1: Prepare ALL nodes ────────────────────────────────────
- name: Install Docker and prepare all nodes
  hosts: mongodb_servers
  become: true
  vars_files:
    - vault/secrets.yml
  vars:
    project_dir: "/home/mongodb/minio"
    ansible_user: "{{ mongodb_server_user }}"
    ansible_password: "{{ mongodb_server_password }}"
    ansible_become_password: "{{ mongodb_server_password }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install required dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create Docker keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker Engine and Compose v2
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is started
      service:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      user:
        name: "{{ mongodb_server_user }}"
        groups: docker
        append: yes

    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        mode: "0755"

    - name: Copy compose file
      copy:
        src: "docker/compose.yml"
        dest: "{{ project_dir }}/docker-compose.yml"

    - name: Copy env file
      copy:
        src: "env/.env"
        dest: "{{ project_dir }}/.env"

    - name: Pull latest images
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        state: present
        pull: always

    - name: Recreate and restart containers
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        project_src: "{{ project_dir }}"
        state: present
        recreate: always
        remove_orphans: true

    - name: Run docker compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        state: present
        pull: always
        recreate: always
        remove_orphans: true

