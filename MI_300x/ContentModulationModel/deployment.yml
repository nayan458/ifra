---
- name: Install Docker and prepare all nodes
  hosts: amd_gpu_server
  become: false
  vars_files:
    - vault/secrets.yml
  vars:
    project_dir: "/home/{{ amd_gpu_server_user }}/artifactRegistory/Content-moderation"
    model_cache_dir: "{{ project_dir }}/deployment/vllm/models"
    ansible_user: "{{ amd_gpu_server_user }}"
    ansible_password: "{{ amd_gpu_server_password }}"

  tasks:
    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        mode: "0755"

    - name: Create model cache directory
      file:
        path: "{{ model_cache_dir }}"
        state: directory
        mode: "0755"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Install/upgrade huggingface_hub and typer on remote host
      pip:
        name:
          - "huggingface_hub[cli]"
          - "typer>=0.12.0"
        state: latest
        executable: /home/cdacsabhas/miniconda3/bin/pip
        extra_args: "--break-system-packages"

    # - name: Install huggingface_hub on remote host
    #   pip:
    #     name: huggingface_hub[hf_xet]
    #     state: latest
    #     extra_args: "--break-system-packages"

    # - name: Download / sync model from HuggingFace
    #   command: >
    #     hf download {{ openai_api_model }}
    #     --cache-dir {{ model_cache_dir }}
    #     --token {{ huggingface_token }}
    #   environment:
    #     HUGGING_FACE_HUB_TOKEN: "{{ huggingface_token }}"
    #   register: hf_download
    #   changed_when: "'Already up to date' not in hf_download.stdout"
    - name: Download / sync model from HuggingFace
      command: >
        /home/cdacsabhas/miniconda3/bin/hf download {{ openai_api_model }}
        --cache-dir {{ model_cache_dir }}
        --token {{ huggingface_token }}
      environment:
        HUGGING_FACE_HUB_TOKEN: "{{ huggingface_token }}"
      register: hf_download
      changed_when: "'Already up to date' not in hf_download.stdout"
    - name: Copy docker compose file
      copy:
        src: "compose.yml"
        dest: "{{ project_dir }}/docker-compose.yml"

    - name: Copy environment file
      copy:
        src: ".env"
        dest: "{{ project_dir }}/.env"

    - name: Start Suggestion Model
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        state: present
        remove_orphans: true