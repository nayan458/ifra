---
- name: Install Docker and prepare all nodes
  hosts: nominatim_servers
  become: true
  vars_files:
    - vault/secrets.yml
  vars:
    project_dir: "/home/{{ nominatim_server_user }}/nominatim"
    ansible_user: "{{ nominatim_server_user }}"
    ansible_password: "{{ nominatim_server_password }}"
    ansible_become_password: "{{ nominatim_server_password }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install required dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Create Docker keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker Engine and Compose v2
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is started
      service:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      user:
        name: "{{ nominatim_server_user }}"
        groups: docker
        append: yes

    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        mode: "0755"

    - name: Copy docker compose file
      copy:
        src: "compose.yml"
        dest: "{{ project_dir }}/docker-compose.yml"

    - name: Copy environment file
      copy:
        src: ".env"
        dest: "{{ project_dir }}/.env"
        
    - name: Copy India OSM PBF
      copy:
        src: "data"
        dest: "{{ project_dir }}"

    - name: Start primary compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        state: present