  - name: Add user to docker group
    user:
      name: "{{ web_server_user }}"
      groups: docker
      append: yes

  - name: Create project directory
    file:
      path: "{{ project_dir }}"
      state: directory
      mode: "0755"

  - name: Copy docker compose file
    copy:
      src: "docker/compose.yml"
      dest: "{{ project_dir }}/docker-compose.yml"

  - name: Copy env folder
    copy:
      src: env/
      dest: "{{ project_dir }}/env/"
  
  - name: Copy nginx folder
    copy:
      src: nginx/
      dest: "{{ project_dir }}/nginx"

  - name: Login to Docker Hub
    community.docker.docker_login:
      username: "{{ docker_username }}"
      password: "{{ docker_password }}"
  
  - name: Add MongoDB hostnames to /etc/hosts
    lineinfile:
      path: /etc/hosts
      line: "{{ item }}"
      state: present
    loop:
      - "10.180.22.114  mongodb-primary"
      - "10.180.22.115  mongodb-secondary"
      - "10.180.22.116  mongodb-arbiter"
      - "10.182.0.210   geo"
      - "10.180.93.12   classification_model"
      - "10.180.93.12   suggestion_model"
      - "10.180.93.12   content-moderation"
      - "10.180.22.116  minio"

  - name: Pull latest images
    community.docker.docker_compose_v2:
      project_src: "{{ project_dir }}"
      state: present
      pull: always

  - name: Recreate and restart containers
    community.docker.docker_compose_v2:
      project_src: "{{ project_dir }}"
      project_src: "{{ project_dir }}"
      state: present
      recreate: always
      remove_orphans: true

  - name: Run docker compose stack
    community.docker.docker_compose_v2:
      project_src: "{{ project_dir }}"
      state: present
      pull: always
      recreate: always
      remove_orphans: true