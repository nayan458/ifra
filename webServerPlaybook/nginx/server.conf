server {
    listen 80;
    server_name inscriptions.cdacb.in;
    
    # Security headers even on HTTP (before redirect)
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # return 301 https://$host$request_uri;
    return 301 https://inscriptions.cdacb.in$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name inscriptions.cdacb.in;
    
    client_max_body_size 4096M;

    ssl_certificate /etc/nginx/certs/inscriptions.cdacb.in.crt;
    ssl_certificate_key /etc/nginx/certs/inscriptions.cdacb.in.key;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # CSP Configuration
    # include /etc/nginx/snippets/csp.conf;

    # Global Security Headers for HTTPS
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(self)" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

    # (Removed sub_filter nonce injection — CSP no longer uses per-request nonces)
    
    # Frontend
    location / {
        # CSP header for frontend
        add_header Content-Security-Policy "$csp_full" always;
        
        # Override global cache-control for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Content-Security-Policy "$csp_full" always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Dynamic content - no cache
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Keep default Accept-Encoding so gzip can run
        client_max_body_size 50M;
        
        # Rate limiting for general traffic
        limit_req zone=general burst=100 nodelay;
    }

    location /admin/ {
        add_header Content-Security-Policy "$csp_full" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

        proxy_pass http://admin:3000;
        rewrite ^/admin/(.*)$ /$1 break;   # strip /admin prefix
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 50M;
        limit_req zone=general burst=100 nodelay;
    }

    location /n8n/ {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: https:; frame-ancestors 'none'; font-src 'self' data:;" always;
        
        proxy_pass http://n8n:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        chunked_transfer_encoding off;
    }

    location /n8n/rest/push {
        proxy_pass http://n8n:5678/rest/push;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Inscription image detection service
    location /detect/ {
        add_header Content-Security-Policy "$csp_full" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        
        rewrite ^/detect/(.*)$ /$1 break;
        proxy_pass http://classification_model:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers - Use HTTPS origin
        add_header 'Access-Control-Allow-Origin' 'https://inscriptions.cdacb.in' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,X-CSRFToken,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://inscriptions.cdacb.in' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,X-CSRFToken,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        # Removed for load testing only
        limit_req zone=api burst=30 nodelay;
        client_max_body_size 50M;
    }

    # Block sensitive internal endpoints
    location ~* ^/api/(swagger-ui|v3/api-docs|actuator)(/|$) {
        allow 127.0.0.1;
        allow ::1;
        allow 10.180.0.0/22;
        deny all;

        proxy_pass http://backend:8080;    # ← no trailing slash
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API requests
    location /api/ {
        add_header Content-Security-Policy "$csp_full" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

        proxy_connect_timeout 10s;
	   proxy_read_timeout 60s;
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-XSRF-TOKEN $http_x_xsrf_token;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
        
        # CORS - Use HTTPS origin
        add_header 'Access-Control-Allow-Origin' 'https://inscriptions.cdacb.in' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,X-CSRFToken,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        client_max_body_size 4096M;
        # Removed for load test purpose only
        limit_req zone=api burst=20 nodelay;
    }

    # Monitoring endpoints (restrict access in production)
    location /metrics {
        
        proxy_pass http://backend:8080/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    proxy_intercept_errors on;

    error_page 400 401 403 404 500 502 503 504 /pageNotFound;

    location = /pageNotFound {
        internal;
        proxy_pass http://frontend:3000/pageNotFound;
        proxy_intercept_errors off;
    }
}