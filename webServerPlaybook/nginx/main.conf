load_module /usr/lib/nginx/modules/ngx_http_headers_more_filter_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;

    keepalive_timeout  65;

    # Hide Nginx version
    server_tokens off;

    more_clear_headers 'Server';

    # Try to remove the `Server` response header when possible.
    # This includes proxy/fastcgi/uwsgi/scgi hide directives and an optional
    # `more_clear_headers 'Server'` line (requires the headers_more module).
    include /etc/nginx/snippets/hide_server.conf;

    # CSP imported globally
    include /etc/nginx/snippets/csp.conf;


    # Enable gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Define rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

    # CORS origin whitelist - only echo back validated origins
    # Matches exact origin for inscriptions.cdacb.in (with optional port)
    map $http_origin $allowed_origin {
        default "";
        ~^https?://inscriptions\.cdacb\.in(:[0-9]+)?$ $http_origin;
    }

    # SSL session cache (if using SSL)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/conf.d/*.conf;
}
