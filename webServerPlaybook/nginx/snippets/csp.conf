map $host $csp_base {
    default "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self';";
}

map $host $csp_script {
    default "script-src 'self' 'wasm-unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.ux4g.gov.in https://cdn.jsdelivr.net; script-src-elem 'self' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.ux4g.gov.in https://cdn.jsdelivr.net;";
}

map $host $csp_style {
    default "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.ux4g.gov.in; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.ux4g.gov.in; font-src 'self' https://fonts.gstatic.com https://cdn.ux4g.gov.in data:;";
}

map $host $csp_media {
    default "img-src 'self' data: blob: https://www.google-analytics.com https://cdn.ux4g.gov.in https://inscriptions.cdacb.in; frame-src 'self' https://www.youtube.com; media-src 'self' blob:;";
}

map $host $csp_connect {
    default "connect-src 'self' https://www.google-analytics.com https://inscriptions.cdacb.in https://meity-auth.ulcacontrib.org wss://inscriptions.cdacb.in https://cdn.jsdelivr.net data:;";
}

map $host $csp_worker {
    default "worker-src 'self' blob:; manifest-src 'self';";
}

map $host $csp_full {
    default "$csp_base $csp_script $csp_style $csp_media $csp_connect $csp_worker";
}