services:
  frontend:
    container_name: stoneinscription-frontend
    image: nayanmoni458/stoneinscription-frontend:latest
    env_file:
      - ./env/frontend.env
    networks:
      - frontend-network
      - backend-network

  backend:
    container_name: stoneinscription-backend
    image: nayanmoni458/stoneinscription-backend:latest
    env_file:
      - ./env/backend.env
    ports:
      - "8081:8081"
    extra_hosts:
      - "mongodb-primary:10.180.22.114"
      - "mongodb-secondary:10.180.22.115"
      - "mongodb-arbiter:10.180.22.116"
      - "geo:10.182.0.210"
      - "kafka:10.180.148.197"
      - "minio:10.180.22.116"
    networks:
      - frontend-network
      - backend-network

  admin:
    container_name: stoneinscription-admin-frontend
    image: nayanmoni458/stoneinscription-admin-frontend:test-v1
    env_file:
      - ./env/admin.env
    networks:
      - frontend-network
      - backend-network

  nginx:
    container_name: stoneinscription-nginx
    image: nayanmoni458/stoneinscription:nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/main.conf:/etc/nginx/nginx.conf
      - ./nginx/server.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/snippets:/etc/nginx/snippets
    extra_hosts:
      - "classification_model:10.180.93.12"
    depends_on:
      - frontend
      - backend
      - n8n 
    networks:
      - frontend-network
      - backend-network
      - n8n-network
    restart: always

  postgres:
    container_name: postgress-n8n-workflow
    image: postgres:15
    env_file:
      - ./env/postgres.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_n8n:/var/lib/postgresql/data
    networks:
      - n8n-network

  n8n:
    container_name: n8n-workflow
    image: docker.n8n.io/n8nio/n8n
    env_file:
      - ./env/n8n.env
    extra_hosts:
      - "geo:10.182.0.210"
      - "suggestion_model:10.180.93.12"
      - "content-moderation:10.180.93.12"
    volumes:
      - n8n:/home/node/.n8n
      - workflow_n8n:/home/node/workflows
    depends_on:
      - postgres
    networks:
      - n8n-network
      
volumes:
  pgdata_n8n:
    external: true
    name: ansible_pgdata_n8n

  n8n:
    external: true
    name: ansible_n8n

  workflow_n8n:
    external: true
    name: ansible_workflow_n8n
    
networks:
  n8n-network:
    driver: bridge
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
